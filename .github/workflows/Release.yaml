name: Release

on:
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  Release:
    if: ${{ github.event.pull_request.merged == true }}
    uses: gesslar/Maint/.github/workflows/ReleaseMudlet.yaml@main
    secrets: inherit
    with:
      quality_check: ""
    permissions:
      contents: write
